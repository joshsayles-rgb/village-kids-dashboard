<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Village Kids Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#5d8da1;  --green:#a0b46a; --green-d:#6b8a3e;
  --tan:#a9794d;   --red:#954a4b;   --dark:#2d2e2e;
  --cream:#f5f2ed; --off:#edeae4;   --off2:#e4e0d9;
  --white:#fff;    --rule:rgba(55,56,56,.08); --rule2:rgba(55,56,56,.14);
  --text:#2d2e2e;  --muted:rgba(45,46,46,.45); --faint:rgba(45,46,46,.22);
  --r:8px; --rl:10px;
}
body.dark{
  --cream:#1e1f1f; --off:#252627; --off2:#2c2e2e; --white:#252627;
  --rule:rgba(255,255,255,.07); --rule2:rgba(255,255,255,.12);
  --text:#e8e5df; --muted:rgba(232,229,223,.45); --faint:rgba(232,229,223,.22);
}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);-webkit-font-smoothing:antialiased;font-size:15px}

/* HEADER */
header{background:var(--dark);height:56px;padding:0 20px;padding-top:env(safe-area-inset-top);height:calc(56px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.05)}
.header-left{display:flex;align-items:center;gap:12px}
.back-btn{background:none;border:none;color:rgba(255,255,255,.45);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 0;transition:color .2s}
.back-btn:hover{color:rgba(255,255,255,.8)}
.back-btn svg{width:14px;height:14px}
.header-title{font-family:'DM Serif Display',serif;font-size:18px;color:rgba(255,255,255,.85)}
.save-status{font-size:12px;min-height:16px;transition:color .2s}
.save-ok{color:var(--green)}.save-saving{color:rgba(255,255,255,.5)}.save-error{color:#e87a6a}
.icon-btn{background:none;border:none;padding:4px;color:rgba(255,255,255,.4);line-height:0;cursor:pointer;transition:color .2s}
.icon-btn:hover{color:rgba(255,255,255,.8)}
.icon-btn svg{width:16px;height:16px}

/* PIN SCREEN */
.pin-screen{display:none;position:fixed;inset:0;background:var(--dark);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.pin-screen.open{display:flex}
.pin-logo{font-family:'DM Serif Display',serif;font-size:18px;color:rgba(255,255,255,.4);letter-spacing:.08em}
.pin-title{font-size:13px;color:rgba(255,255,255,.45);letter-spacing:.06em;text-transform:uppercase}
.pin-dots{display:flex;gap:14px}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.25);transition:all .15s}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,68px);gap:10px}
.pin-key{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.07);border:none;color:#fff;font-family:'DM Serif Display',serif;font-size:22px;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center}
.pin-key:hover{background:rgba(255,255,255,.14)}
.pin-key:active{background:rgba(255,255,255,.2)}
.pin-del{font-family:'DM Sans',sans-serif;font-size:14px}
.pin-error{font-size:12px;color:#e87a6a;min-height:16px}

/* LAYOUT */
.page{max-width:720px;margin:0 auto;padding:20px 16px 60px;display:flex;flex-direction:column;gap:20px}
.section{background:var(--white);border-radius:var(--rl);border:1px solid var(--rule);overflow:hidden}
.section-hdr{padding:13px 16px;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between}
.section-title{font-family:'DM Serif Display',serif;font-size:16px;color:var(--text)}
.section-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}

/* FORM ELEMENTS */
.field-label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.field-input{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;border:1px solid var(--rule2);border-radius:var(--r);background:var(--off);color:var(--text);outline:none;transition:border-color .2s;-webkit-appearance:none}
.field-input:focus{border-color:var(--tan);background:var(--white)}
.field-input::placeholder{color:var(--faint)}
select.field-input{cursor:pointer}
.field-row{display:flex;gap:8px;align-items:flex-end}
.field-row .field-input{flex:1}

/* BUTTONS */
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:8px 14px;border-radius:var(--r);border:none;cursor:pointer;transition:opacity .15s;white-space:nowrap;flex-shrink:0}
.btn:hover{opacity:.82}
.btn-tan{background:var(--tan);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:var(--off2);color:var(--text);border:1px solid var(--rule2)}
.btn-full{width:100%;padding:11px;font-size:13px}

/* LIST ITEMS */
.list-item{display:flex;align-items:flex-start;gap:10px;background:var(--off);border-radius:var(--r);padding:10px 12px;border:1px solid var(--rule)}
.list-item-body{flex:1;min-width:0}
.list-item-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.list-item-sub{font-size:11px;color:var(--muted);margin-top:2px}
.list-item-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:1px 4px;flex-shrink:0;transition:color .15s}
.list-item-del:hover{color:var(--red)}
.badge{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:3px;display:inline-block;margin-right:4px}

/* NOW TOGGLES */
.now-list{display:flex;flex-direction:column;gap:5px}
.now-row{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:all .15s}
.now-row:hover{background:var(--off)}
.now-row.active{background:rgba(169,121,77,.1);border-color:rgba(169,121,77,.25)}
.now-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--muted);flex-shrink:0;transition:all .15s}
.now-row.active .now-dot{background:var(--red);border-color:var(--red)}
.now-label{flex:1;font-size:13px;color:var(--text)}
.now-time{font-size:11px;color:var(--muted);font-family:'DM Serif Display',serif}

/* ALERT SECTION */
.alert-active{background:rgba(149,74,75,.1);border:1px solid rgba(149,74,75,.25);border-radius:var(--r);padding:10px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.alert-active-text{font-size:13px;font-weight:500;color:var(--red);flex:1}

/* WEEK FIELDS GRID */
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.fields-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div class="pin-screen" id="pinScreen">
  <div class="pin-logo">Village Kids</div>
  <div class="pin-title">Admin PIN</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-error" id="pinError"></div>
  <div class="pin-pad">
    <button class="pin-key" onclick="Pin.key('1')">1</button>
    <button class="pin-key" onclick="Pin.key('2')">2</button>
    <button class="pin-key" onclick="Pin.key('3')">3</button>
    <button class="pin-key" onclick="Pin.key('4')">4</button>
    <button class="pin-key" onclick="Pin.key('5')">5</button>
    <button class="pin-key" onclick="Pin.key('6')">6</button>
    <button class="pin-key" onclick="Pin.key('7')">7</button>
    <button class="pin-key" onclick="Pin.key('8')">8</button>
    <button class="pin-key" onclick="Pin.key('9')">9</button>
    <button class="pin-key" onclick="Pin.key('0')">0</button>
    <button class="pin-key pin-del" onclick="Pin.del()">&larr;</button>
  </div>
</div>

<header>
  <div class="header-left">
    <button class="back-btn" onclick="window.location.href='/village-kids-dashboard/'">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Dashboard
    </button>
    <span class="header-title">Admin</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="save-status" id="saveStatus"></span>
    <button class="icon-btn" onclick="toggleDark()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
    </button>
  </div>
</header>

<div class="page" id="adminPage">

  <!-- ANNOUNCEMENTS -->
  <div class="section">
    <div class="section-hdr">
      <span class="section-title">Announcements</span>
    </div>
    <div class="section-body">
      <div id="annList"></div>
      <div style="display:flex;flex-direction:column;gap:8px;padding-top:6px;border-top:1px solid var(--rule)">
        <div class="field-row">
          <div style="flex:none;width:130px">
            <div class="field-label">Scope</div>
            <select class="field-input" id="newAnnScope">
              <option value="All services">All services</option>
              <option value="1st Service">1st Service</option>
              <option value="2nd Service">2nd Service</option>
            </select>
          </div>
          <div style="flex:none;width:110px">
            <div class="field-label">Tag</div>
            <select class="field-input" id="newAnnTag">
              <option value="Info">Info</option>
              <option value="Urgent">Urgent</option>
              <option value="Event">Event</option>
              <option value="Prayer">Prayer</option>
            </select>
          </div>
        </div>
        <div>
          <div class="field-label">Title</div>
          <input class="field-input" id="newAnnTitle" placeholder="Announcement title..." maxlength="80">
        </div>
        <div>
          <div class="field-label">Detail (optional)</div>
          <div class="field-row">
            <input class="field-input" id="newAnnDetail" placeholder="Supporting detail..." maxlength="140">
            <button class="btn btn-tan" onclick="Announcements.add()">Add</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TICKER -->
  <div class="section">
    <div class="section-hdr"><span class="section-title">Scrolling ticker</span></div>
    <div class="section-body">
      <div id="tickerList"></div>
      <div style="padding-top:6px;border-top:1px solid var(--rule)">
        <div class="field-label">New message</div>
        <div class="field-row">
          <input class="field-input" id="newTickerMsg" placeholder="Ticker message..." maxlength="120">
          <button class="btn btn-tan" onclick="Ticker.add()">Add</button>
        </div>
      </div>
    </div>
  </div>

  <!-- WEEKLY SETTINGS -->
  <div class="section">
    <div class="section-hdr"><span class="section-title">This week</span></div>
    <div class="section-body">
      <div class="fields-grid">
        <div>
          <div class="field-label">1st service time</div>
          <input class="field-input" id="ws1" placeholder="9:15 AM">
        </div>
        <div>
          <div class="field-label">2nd service time</div>
          <input class="field-input" id="ws2" placeholder="11:00 AM">
        </div>
        <div>
          <div class="field-label">Catechism number</div>
          <input class="field-input" id="wsCat" type="number" min="1" max="52" placeholder="1-52">
        </div>
        <div>
          <div class="field-label">Service note</div>
          <input class="field-input" id="wsNote" placeholder="Optional note...">
        </div>
      </div>
      <div>
        <div class="field-label">Memory verse</div>
        <input class="field-input" id="wsVerse" placeholder="Full verse text...">
      </div>
      <div>
        <div class="field-label">Verse reference</div>
        <div class="field-row">
          <input class="field-input" id="wsRef" placeholder="e.g. John 3:16">
          <button class="btn btn-tan" onclick="Settings.save()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SCHEDULE NOW -->
  <div class="section">
    <div class="section-hdr"><span class="section-title">Schedule &mdash; mark current item</span></div>
    <div class="section-body">
      <div class="field-label" style="margin-bottom:2px">Select class</div>
      <select class="field-input" id="nowClassSel" onchange="NowToggle.render()">
        <option value="">Choose a class...</option>
      </select>
      <div class="now-list" id="nowList"></div>
    </div>
  </div>

  <!-- URGENT ALERT -->
  <div class="section">
    <div class="section-hdr"><span class="section-title">Urgent alert</span></div>
    <div class="section-body">
      <div id="alertActiveSection"></div>
      <div>
        <div class="field-label">Alert message</div>
        <div class="field-row" style="margin-top:4px">
          <input class="field-input" id="newAlertMsg" placeholder="Alert message..." maxlength="160">
          <button class="btn btn-red" onclick="Alert.send()">Send</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
'use strict';

const WORKER_URL = 'https://sparkling-surf-f15f.joshsayles.workers.dev';
const ADMIN_PIN  = '2024';
const PIN_KEY    = 'vk_pin_exp';
const PIN_TTL    = 4 * 60 * 60 * 1000;
const DARK_KEY   = 'vk_dark';

// \u2500\u2500 STATE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const S = {
  announcements: [],
  ticker:        [],
  settings:      {},
  classes:       [],
  alerts:        [],
};

function el(id) { return document.getElementById(id); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setStatus(cls, txt) {
  const el2 = el('saveStatus');
  el2.className = 'save-status ' + (cls || '');
  el2.textContent = txt;
  if (cls === 'save-ok') setTimeout(() => { el2.textContent = ''; }, 3000);
}

function toggleDark() {
  const on = document.body.classList.toggle('dark');
  localStorage.setItem(DARK_KEY, on ? '1' : '0');
}

// \u2500\u2500 PIN \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const Pin = {
  entry: '',

  init() {
    const exp = parseInt(localStorage.getItem(PIN_KEY) || '0');
    if (Date.now() < exp) { this.unlock(); return; }
    el('pinScreen').classList.add('open');
  },

  key(k) {
    if (this.entry.length >= 4) return;
    this.entry += k;
    this.syncDots();
    if (this.entry.length === 4) setTimeout(() => this.check(), 120);
  },

  del() { this.entry = this.entry.slice(0, -1); this.syncDots(); },

  syncDots() {
    for (let i = 0; i < 4; i++) {
      el('pd' + i).classList.toggle('filled', i < this.entry.length);
    }
  },

  check() {
    if (this.entry === ADMIN_PIN) {
      localStorage.setItem(PIN_KEY, (Date.now() + PIN_TTL).toString());
      el('pinScreen').classList.remove('open');
      this.entry = '';
      this.syncDots();
      this.unlock();
    } else {
      el('pinError').textContent = 'Incorrect PIN';
      this.entry = '';
      this.syncDots();
      setTimeout(() => { el('pinError').textContent = ''; }, 1500);
    }
  },

  unlock() { loadData(); }
};

// \u2500\u2500 DATA LOAD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function loadData() {
  try {
    const res  = await fetch(WORKER_URL + '?action=read', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    S.announcements = data.announcements || [];
    S.ticker        = data.ticker        || [];
    S.settings      = data.settings      || {};
    S.classes       = data.classes       || [];
    S.alerts        = data.alerts        || [];
    renderAll();
  } catch (err) {
    setStatus('save-error', 'Load failed: ' + err.message);
  }
}

async function notionWrite(payload) {
  const res = await fetch(WORKER_URL + '?action=write', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
    cache: 'no-store',
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// \u2500\u2500 RENDER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderAll() {
  renderAnnouncements();
  renderTicker();
  renderSettings();
  renderNowSelector();
  renderAlerts();
}

const ANN_COLORS = { Info:'#5d8da1', Urgent:'#954a4b', Event:'#a0b46a', Prayer:'#a9794d' };

function renderAnnouncements() {
  const list = el('annList');
  if (!S.announcements.length) {
    list.innerHTML = '<p style="font-size:13px;color:var(--muted);font-style:italic;margin-bottom:8px">No announcements.</p>';
    return;
  }
  list.innerHTML = S.announcements.map((a, i) => {
    const col = ANN_COLORS[a.tag] || ANN_COLORS.Info;
    return '<div class="list-item" style="border-left:3px solid ' + col + '">'
      + '<div class="list-item-body">'
      + '<div class="list-item-title">' + esc(a.title) + '</div>'
      + '<div class="list-item-sub">'
      + '<span class="badge" style="background:rgba(0,0,0,.06)">' + esc(a.scope||'All') + '</span>'
      + '<span class="badge" style="background:rgba(0,0,0,.06)">' + esc(a.tag||'Info') + '</span>'
      + (a.detail ? esc(a.detail) : '')
      + '</div></div>'
      + '<button class="list-item-del" onclick="Announcements.remove(\'' + a.id + '\')" title="Delete">&times;</button>'
      + '</div>';
  }).join('');
}

function renderTicker() {
  const list = el('tickerList');
  if (!S.ticker.length) {
    list.innerHTML = '<p style="font-size:13px;color:var(--muted);font-style:italic;margin-bottom:8px">No ticker messages.</p>';
    return;
  }
  list.innerHTML = S.ticker.map((t) =>
    '<div class="list-item">'
    + '<div class="list-item-body"><div class="list-item-title">' + esc(t.message) + '</div></div>'
    + '<button class="list-item-del" onclick="Ticker.remove(\'' + t.id + '\')" title="Delete">&times;</button>'
    + '</div>'
  ).join('');
}

function renderSettings() {
  const s = S.settings;
  el('ws1').value    = s.service1_time    || '';
  el('ws2').value    = s.service2_time    || '';
  el('wsCat').value  = s.catechism_number || '';
  el('wsNote').value = s.service_note     || '';
  el('wsVerse').value= s.verse_full       || '';
  el('wsRef').value  = s.verse_ref        || '';
}

function renderNowSelector() {
  const sel = el('nowClassSel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Choose a class...</option>';
  const classes = ['Nursery','Toddler/Wobbler','Preschool','Kindergarten - 1st Grade','2nd - 3rd Grade','4th - 6th Grade'];
  classes.forEach(c => {
    const rows = S.classes.filter(r => r.class === c && (r.service||'').toLowerCase() !== '2nd');
    if (!rows.length) return;
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    if (c === cur) opt.selected = true;
    sel.appendChild(opt);
  });
  NowToggle.render();
}

function renderAlerts() {
  const urgent = S.alerts.find(a => a.type === 'Urgent');
  const sec    = el('alertActiveSection');
  if (urgent) {
    sec.innerHTML = '<div class="alert-active">'
      + '<span class="alert-active-text">' + esc(urgent.message) + '</span>'
      + '<button class="btn btn-ghost" onclick="Alert.clear(\'' + urgent.id + '\')">Clear</button>'
      + '</div>';
  } else {
    sec.innerHTML = '';
  }
}

// \u2500\u2500 ANNOUNCEMENTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const Announcements = {
  async add() {
    const title  = el('newAnnTitle').value.trim();
    const detail = el('newAnnDetail').value.trim();
    const scope  = el('newAnnScope').value;
    const tag    = el('newAnnTag').value;
    if (!title) { el('newAnnTitle').focus(); return; }
    setStatus('save-saving', 'Saving...');
    try {
      await notionWrite({
        operation: 'create',
        database:  'announcements',
        data: {
          Title:  [{ text: { content: title } }],
          Detail: [{ text: { content: detail } }],
          Scope:  { name: scope },
          Tag:    { name: tag },
          Active: true,
        }
      });
      el('newAnnTitle').value = '';
      el('newAnnDetail').value = '';
      setStatus('save-ok', 'Saved');
      await loadData();
    } catch (err) { setStatus('save-error', err.message); }
  },

  async remove(id) {
    setStatus('save-saving', 'Removing...');
    try {
      await notionWrite({ operation: 'delete', pageId: id });
      S.announcements = S.announcements.filter(a => a.id !== id);
      renderAnnouncements();
      setStatus('save-ok', 'Removed');
    } catch (err) { setStatus('save-error', err.message); }
  }
};

// \u2500\u2500 TICKER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const Ticker = {
  async add() {
    const msg = el('newTickerMsg').value.trim();
    if (!msg) { el('newTickerMsg').focus(); return; }
    setStatus('save-saving', 'Saving...');
    try {
      await notionWrite({
        operation: 'create',
        database:  'ticker',
        data: { Message: [{ text: { content: msg } }], Active: true }
      });
      el('newTickerMsg').value = '';
      setStatus('save-ok', 'Saved');
      await loadData();
    } catch (err) { setStatus('save-error', err.message); }
  },

  async remove(id) {
    setStatus('save-saving', 'Removing...');
    try {
      await notionWrite({ operation: 'delete', pageId: id });
      S.ticker = S.ticker.filter(t => t.id !== id);
      renderTicker();
      setStatus('save-ok', 'Removed');
    } catch (err) { setStatus('save-error', err.message); }
  }
};

// \u2500\u2500 SETTINGS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const Settings = {
  async save() {
    const s = S.settings;
    if (!s.id) { setStatus('save-error', 'No settings page found'); return; }
    setStatus('save-saving', 'Saving...');
    try {
      await notionWrite({
        operation: 'update',
        pageId:    s.id,
        data: {
          '1st Service Time': [{ text: { content: el('ws1').value.trim() } }],
          '2nd Service Time': [{ text: { content: el('ws2').value.trim() } }],
          'Service Note':     [{ text: { content: el('wsNote').value.trim() } }],
          'Catechism Number': parseFloat(el('wsCat').value) || null,
          'Memory Verse':     [{ text: { content: el('wsVerse').value.trim() } }],
          'Verse Reference':  [{ text: { content: el('wsRef').value.trim() } }],
        }
      });
      setStatus('save-ok', 'Saved');
    } catch (err) { setStatus('save-error', err.message); }
  }
};

// \u2500\u2500 NOW TOGGLE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const NowToggle = {
  render() {
    const cls  = el('nowClassSel').value;
    const list = el('nowList');
    if (!cls) { list.innerHTML = ''; return; }
    const rows = S.classes.filter(r => r.class === cls && (r.service||'').toLowerCase() !== '2nd');
    list.innerHTML = rows.map((r, i) =>
      '<div class="now-row' + (r.now ? ' active' : '') + '" onclick="NowToggle.toggle(\'' + r.id + '\',\'' + cls + '\')">'
      + '<div class="now-dot"></div>'
      + '<span class="now-label">' + esc(r.event) + '</span>'
      + '<span class="now-time">' + esc(r.time) + '</span>'
      + '</div>'
    ).join('');
  },

  async toggle(id, cls) {
    // Clear all in class, set this one if not already set
    const rows   = S.classes.filter(r => r.class === cls && (r.service||'').toLowerCase() !== '2nd');
    const target = rows.find(r => r.id === id);
    const wasNow = target && target.now;
    setStatus('save-saving', 'Saving...');
    try {
      // Update all rows in class (clear now)
      await Promise.all(rows.map(r =>
        notionWrite({ operation: 'update', pageId: r.id, data: { Now: !wasNow && r.id === id } })
      ));
      // Update local state
      rows.forEach(r => { r.now = (!wasNow && r.id === id); });
      this.render();
      setStatus('save-ok', 'Saved');
    } catch (err) { setStatus('save-error', err.message); }
  }
};

// \u2500\u2500 URGENT ALERT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const Alert = {
  async send() {
    const msg = el('newAlertMsg').value.trim();
    if (!msg) { el('newAlertMsg').focus(); return; }
    // Clear any existing urgent alert first
    const existing = S.alerts.find(a => a.type === 'Urgent');
    if (existing) await this.clear(existing.id, true);
    setStatus('save-saving', 'Sending...');
    try {
      await notionWrite({
        operation: 'create',
        database:  'alerts',
        data: {
          Message: [{ text: { content: msg } }],
          Type:    { name: 'Urgent' },
          Active:  true,
        }
      });
      el('newAlertMsg').value = '';
      setStatus('save-ok', 'Alert sent');
      await loadData();
    } catch (err) { setStatus('save-error', err.message); }
  },

  async clear(id, silent) {
    if (!silent) setStatus('save-saving', 'Clearing...');
    try {
      await notionWrite({ operation: 'delete', pageId: id });
      if (!silent) { setStatus('save-ok', 'Alert cleared'); await loadData(); }
    } catch (err) { if (!silent) setStatus('save-error', err.message); }
  }
};

// \u2500\u2500 INIT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
if (localStorage.getItem(DARK_KEY) === '1') document.body.classList.add('dark');
Pin.init();
</script>
